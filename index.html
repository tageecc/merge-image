<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Theme Merge - Light & Dark</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    
    h1 {
      color: #fff;
      font-size: 24px;
      margin: 0;
    }
    
    canvas {
      cursor: pointer;
      border-radius: 8px;
      max-width: 90vw;
      max-height: 70vh;
      width: auto;
      height: auto;
      object-fit: contain;
    }
    
    canvas.empty {
      border: 2px dashed #444;
    }
    
    .canvas-container {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      max-width: 90vw;
    }
    
    .controls {
      display: flex;
      gap: 15px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }
    
    button {
      padding: 10px 20px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }
    
    button:hover {
      background: #2563eb;
      transform: translateY(-1px);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    button:disabled {
      background: #555;
      cursor: not-allowed;
      transform: none;
    }
    
    label {
      color: #fff;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    input[type="range"] {
      width: 200px;
    }
    
    .info {
      color: #888;
      font-size: 13px;
      text-align: center;
      max-width: 600px;
    }
    
    .upload-prompt {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #666;
      font-size: 16px;
      text-align: center;
      pointer-events: none;
      z-index: 10;
    }
    
    #hoverCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
    }
    
    @media (max-width: 768px) {
      body {
        padding: 10px;
      }
      
      h1 {
        font-size: 18px;
        text-align: center;
      }
      
      canvas {
        max-width: 95vw;
        max-height: 60vh;
      }
      
      .controls {
        flex-direction: column;
        gap: 10px;
        width: 100%;
      }
      
      label {
        flex-direction: column;
        width: 100%;
      }
      
      input[type="range"] {
        width: 100%;
        max-width: 300px;
      }
      
      .info {
        font-size: 12px;
        padding: 0 10px;
      }
    }
  </style>
</head>
<body>
  <h1>🎨 Theme Comparison - Light ↗️ Dark</h1>
  
  <div class="canvas-container">
    <canvas id="canvas" class="empty" width="800" height="600"></canvas>
    <canvas id="hoverCanvas"></canvas>
    <div class="upload-prompt" id="uploadPrompt">
      Click to upload first image<br>
      <small style="color: #555;">Left: Light theme • Right: Dark theme</small>
    </div>
  </div>
  
  <div class="controls">
    <label>
      Diagonal Angle:
      <input type="range" id="angleSlider" min="-45" max="45" value="0" step="1">
      <span id="angleValue">0°</span>
    </label>
    
    <button id="downloadBtn">💾 Download Image</button>
  </div>
  
  <input type="file" id="lightFileInput" accept="image/*" style="display: none;">
  <input type="file" id="darkFileInput" accept="image/*" style="display: none;">
  
  <div class="info">
    Click left area to upload/replace light theme · Click right area to upload/replace dark theme<br>
    Upload one image to preview, upload both to create diagonal merge effect
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const hoverCanvas = document.getElementById('hoverCanvas');
    const hoverCtx = hoverCanvas.getContext('2d');
    const angleSlider = document.getElementById('angleSlider');
    const angleValue = document.getElementById('angleValue');
    const downloadBtn = document.getElementById('downloadBtn');
    const lightFileInput = document.getElementById('lightFileInput');
    const darkFileInput = document.getElementById('darkFileInput');
    const uploadPrompt = document.getElementById('uploadPrompt');
    
    let lightImg = null;
    let darkImg = null;
    
    // Sync hover canvas size with main canvas
    function syncHoverCanvasSize() {
      hoverCanvas.width = canvas.width;
      hoverCanvas.height = canvas.height;
    }
    
    syncHoverCanvasSize();
    
    // Initial state - disable download button
    downloadBtn.disabled = true;
    
    function updateUI() {
      const bothImagesLoaded = lightImg && darkImg;
      const anyImageLoaded = lightImg || darkImg;
      downloadBtn.disabled = !bothImagesLoaded;
      uploadPrompt.style.display = anyImageLoaded ? 'none' : 'block';
      
      // Control canvas border - only show when empty
      if (anyImageLoaded) {
        canvas.classList.remove('empty');
      } else {
        canvas.classList.add('empty');
      }
    }
    
    updateUI();
    
    function drawMergedImage() {
      // Handle case when no images are loaded
      if (!lightImg && !darkImg) return;
      
      // Clear canvas
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // If only one image is loaded, just display it
      if (!darkImg && lightImg) {
        ctx.drawImage(lightImg, 0, 0);
        return;
      }
      
      if (!lightImg && darkImg) {
        ctx.drawImage(darkImg, 0, 0);
        return;
      }
      
      // Both images loaded - draw merged effect
      const angle = parseFloat(angleSlider.value);
      
      // Draw dark theme as base
      ctx.drawImage(darkImg, 0, 0);
      
      // Create diagonal mask for light theme
      ctx.save();
      
      // Create clipping path - diagonal line from top-left to bottom-right
      ctx.beginPath();
      
      const angleRad = (angle * Math.PI) / 180;
      
      // Calculate diagonal line endpoints with rotation
      const diagonal = Math.sqrt(canvas.width ** 2 + canvas.height ** 2);
      const baseAngle = Math.atan2(canvas.height, canvas.width);
      
      // Top-left triangle (light theme area)
      ctx.moveTo(0, 0);
      ctx.lineTo(canvas.width, 0);
      
      // Diagonal line with angle adjustment
      const x1 = canvas.width + diagonal * Math.cos(baseAngle + angleRad);
      const y1 = -diagonal * Math.sin(baseAngle + angleRad);
      const x2 = -diagonal * Math.cos(baseAngle + angleRad);
      const y2 = canvas.height + diagonal * Math.sin(baseAngle + angleRad);
      
      ctx.lineTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.lineTo(0, canvas.height);
      ctx.closePath();
      
      ctx.clip();
      
      // Draw light theme in the clipped area
      ctx.drawImage(lightImg, 0, 0);
      
      ctx.restore();
    }
    
    // Check if click is on light or dark side
    function isPointOnLightSide(x, y) {
      const angle = parseFloat(angleSlider.value);
      const angleRad = (angle * Math.PI) / 180;
      const baseAngle = Math.atan2(canvas.height, canvas.width);
      const diagonal = Math.sqrt(canvas.width ** 2 + canvas.height ** 2);
      
      // Calculate diagonal line endpoints
      const x1 = canvas.width + diagonal * Math.cos(baseAngle + angleRad);
      const y1 = -diagonal * Math.sin(baseAngle + angleRad);
      const x2 = -diagonal * Math.cos(baseAngle + angleRad);
      const y2 = canvas.height + diagonal * Math.sin(baseAngle + angleRad);
      
      // Use cross product to determine which side of the line the point is on
      // Vector from (x2, y2) to (x1, y1)
      const lineVecX = x1 - x2;
      const lineVecY = y1 - y2;
      
      // Vector from (x2, y2) to point (x, y)
      const pointVecX = x - x2;
      const pointVecY = y - y2;
      
      // Cross product
      const cross = lineVecX * pointVecY - lineVecY * pointVecX;
      
      // If cross product is positive, point is on the left side (light theme)
      return cross > 0;
    }
    
    // Event listeners
    angleSlider.addEventListener('input', (e) => {
      angleValue.textContent = e.target.value + '°';
      drawMergedImage();
    });
    
    // Draw hover highlight on canvas
    function drawHoverHighlight(isLight) {
      // Only show highlight when both images are loaded
      if (!lightImg || !darkImg) return;
      
      hoverCtx.clearRect(0, 0, hoverCanvas.width, hoverCanvas.height);
      
      const angle = parseFloat(angleSlider.value);
      const angleRad = (angle * Math.PI) / 180;
      const diagonal = Math.sqrt(hoverCanvas.width ** 2 + hoverCanvas.height ** 2);
      const baseAngle = Math.atan2(hoverCanvas.height, hoverCanvas.width);
      
      // Calculate diagonal line endpoints
      const x1 = hoverCanvas.width + diagonal * Math.cos(baseAngle + angleRad);
      const y1 = -diagonal * Math.sin(baseAngle + angleRad);
      const x2 = -diagonal * Math.cos(baseAngle + angleRad);
      const y2 = hoverCanvas.height + diagonal * Math.sin(baseAngle + angleRad);
      
      // Draw trapezoid outline with glow
      hoverCtx.save();
      hoverCtx.beginPath();
      
      if (isLight) {
        // Light theme area (top-left)
        hoverCtx.moveTo(0, 0);
        hoverCtx.lineTo(hoverCanvas.width, 0);
        hoverCtx.lineTo(x1, y1);
        hoverCtx.lineTo(x2, y2);
        hoverCtx.lineTo(0, hoverCanvas.height);
      } else {
        // Dark theme area (bottom-right)
        hoverCtx.moveTo(hoverCanvas.width, 0);
        hoverCtx.lineTo(hoverCanvas.width, hoverCanvas.height);
        hoverCtx.lineTo(0, hoverCanvas.height);
        hoverCtx.lineTo(x2, y2);
        hoverCtx.lineTo(x1, y1);
      }
      
      hoverCtx.closePath();
      
      // Fill with more visible color
      hoverCtx.fillStyle = isLight ? 'rgba(59, 130, 246, 0.15)' : 'rgba(96, 165, 250, 0.15)';
      hoverCtx.fill();
      
      // Draw glowing border (multiple layers for stronger effect)
      hoverCtx.strokeStyle = isLight ? 'rgba(59, 130, 246, 0.9)' : 'rgba(96, 165, 250, 0.9)';
      hoverCtx.lineWidth = 6;
      hoverCtx.shadowColor = isLight ? 'rgba(59, 130, 246, 0.8)' : 'rgba(96, 165, 250, 0.8)';
      hoverCtx.shadowBlur = 20;
      hoverCtx.stroke();
      
      // Draw second layer for extra glow
      hoverCtx.shadowBlur = 40;
      hoverCtx.lineWidth = 4;
      hoverCtx.stroke();
      
      hoverCtx.restore();
    }
    
    // Get mouse position relative to canvas
    function getCanvasMousePosition(e, targetCanvas) {
      const rect = targetCanvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      
      // Scale coordinates to canvas size
      const scaleX = targetCanvas.width / rect.width;
      const scaleY = targetCanvas.height / rect.height;
      const canvasX = x * scaleX;
      const canvasY = y * scaleY;
      
      return { canvasX, canvasY };
    }
    
    // Mouse hover effect on canvas
    canvas.addEventListener('mousemove', (e) => {
      const { canvasX, canvasY } = getCanvasMousePosition(e, canvas);
      const isLight = isPointOnLightSide(canvasX, canvasY);
      drawHoverHighlight(isLight);
    });
    
    // Remove hover effect when mouse leaves
    canvas.addEventListener('mouseleave', () => {
      hoverCtx.clearRect(0, 0, hoverCanvas.width, hoverCanvas.height);
    });
    
    // Click on canvas to replace images
    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      
      // Scale coordinates to canvas size
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const canvasX = x * scaleX;
      const canvasY = y * scaleY;
      
      if (isPointOnLightSide(canvasX, canvasY)) {
        lightFileInput.click();
      } else {
        darkFileInput.click();
      }
    });
    
    // Handle light theme image upload
    lightFileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            lightImg = img;
            // Set canvas size to match the first loaded image
            if (!darkImg || !canvas.width || canvas.width === 800) {
              canvas.width = lightImg.width;
              canvas.height = lightImg.height;
              syncHoverCanvasSize();
            }
            updateUI();
            drawMergedImage();
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      }
    });
    
    // Handle dark theme image upload
    darkFileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            darkImg = img;
            // Set canvas size to match the first loaded image
            if (!lightImg || !canvas.width || canvas.width === 800) {
              canvas.width = darkImg.width;
              canvas.height = darkImg.height;
              syncHoverCanvasSize();
            }
            updateUI();
            drawMergedImage();
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      }
    });
    
    // Download functionality
    downloadBtn.addEventListener('click', () => {
      const link = document.createElement('a');
      const timestamp = new Date().toISOString().slice(0, 10).replace(/-/g, '');
      link.download = `theme-merge-${timestamp}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    });
  </script>
</body>
</html>
